<!DOCTYPE html>
<html>
<head>
    <title>Mini DevOps Platform</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 400px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 15px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        .dashboard-btn {
            background: #4CAF50;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>🚀 Mini DevOps Platform</h2>

        <form action="/deploy" method="POST">
            <input type="text" name="repo" placeholder="Enter GitHub Repo URL" required>
            <br>
            <button type="submit">Deploy</button>
        </form>

        <!-- ✅ NEW BUTTON -->
        <form action="/dashboard" method="GET">
            <button class="dashboard-btn">📊 View Deployments</button>
        </form>

    </div>
</div>

</body>
</html>
