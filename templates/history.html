<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deployment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Deployment History</h1>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3">Back to Deployments</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Repository</th>
                <th>Timestamp</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for h in history|reverse %}
            <tr>
                <td>{{ h.repo }}</td>
                <td>{{ h.time }}</td>
                <td>
                    {% if h.status == 'running' %}<span class="badge bg-success">{{ h.status }}</span>
                    {% elif h.status == 'stopped' %}<span class="badge bg-danger">{{ h.status }}</span>
                    {% else %}<span class="badge bg-secondary">{{ h.status }}</span>{% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
