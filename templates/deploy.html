<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deploy GitHub Repository</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
        }
        .deploy-card {
            max-width: 600px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            background-color: #ffffff;
        }
        .btn-primary { width: 100%; }
        .header { text-align: center; margin-bottom: 30px; }
        .alert { border-radius: 10px; }
        input.form-control {
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="deploy-card">
    <div class="header">
        <h2><i class="bi bi-cloud-upload"></i> Deploy a GitHub Repository</h2>
        <p>Paste your repository URL and deploy your app instantly!</p>
    </div>
    <form method="POST">
        <div class="mb-3">
            <label for="repo" class="form-label">GitHub Repository URL</label>
            <input type="text" class="form-control" id="repo" name="repo" placeholder="https://github.com/user/repo.git" required>
        </div>
        <button type="submit" class="btn btn-primary mb-3"><i class="bi bi-play-circle"></i> Deploy</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary w-100"><i class="bi bi-speedometer2"></i> Go to Dashboard</a>
    </form>

    {% if error %}
        <div class="alert alert-danger mt-3"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="alert alert-success mt-3">
            <i class="bi bi-check-circle"></i> Repository <strong>{{ repo }}</strong> deployed successfully! 
            <a href="{{ url }}" target="_blank">Open App</a>
        </div>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
